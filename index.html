<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Firebase 로그인 데이터 관리</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      font-weight: bold;
    }

    .login-btn { background: #42a5f5; color: white; }
    .logout-btn { background: #ef5350; color: white; }

    .box {
      margin-top: 12px;
      padding: 12px;
      background: #f7f9fb;
      border-radius: 12px;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<div class="container">
  <h2>🔥 Firebase 로그인 시스템</h2>

  <!-- LOGIN -->
  <div id="authBox">
    <input id="email" type="email" placeholder="이메일">
    <input id="pw" type="password" placeholder="비밀번호">
    <button class="login-btn" id="loginBtn">로그인</button>
  </div>

  <!-- MAIN -->
  <div id="mainBox" class="hidden">
    <button class="logout-btn" id="logoutBtn">로그아웃</button>

    <div class="box">
      <b>로그인 기록</b>
      <div id="logList"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 Firebase 설정 */
const firebaseConfig = {
  apiKey: "AIzaSyBmI4WtKPBD4meKik1kte92FsrWWKE4zpY",
  authDomain: "test-cccd1.firebaseapp.com",
  databaseURL: "https://test-cccd1-default-rtdb.firebaseio.com",
  projectId: "test-cccd1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* 🔥 로그인 유지 (GitHub Pages 핵심) */
await setPersistence(auth, browserLocalPersistence);

/* DOM */
const email = document.getElementById("email");
const pw = document.getElementById("pw");
const authBox = document.getElementById("authBox");
const mainBox = document.getElementById("mainBox");
const logList = document.getElementById("logList");

/* 현재 유저 */
let user = null;

/* ================= LOGIN ================= */
document.getElementById("loginBtn").addEventListener("click", async () => {
  console.log("LOGIN CLICKED");

  if (!email.value || !pw.value) {
    alert("이메일/비밀번호 입력");
    return;
  }

  try {
    const result = await signInWithEmailAndPassword(
      auth,
      email.value,
      pw.value
    );

    console.log("LOGIN SUCCESS:", result.user.email);

  } catch (err) {
    console.error(err);
    alert("로그인 실패: " + err.message);
  }
});

/* ================= LOGOUT ================= */
document.getElementById("logoutBtn").addEventListener("click", async () => {
  if (user) {
    const logRef = ref(db, "loginLogs/" + user.uid);
    const newLog = push(logRef);

    await set(newLog, {
      email: user.email,
      type: "logout",
      time: new Date().toLocaleString()
    });
  }

  await signOut(auth);
});

/* ================= STATE ================= */
onAuthStateChanged(auth, (u) => {
  if (u) {
    user = u;

    authBox.classList.add("hidden");
    mainBox.classList.remove("hidden");

    loadLogs();
  } else {
    user = null;

    authBox.classList.remove("hidden");
    mainBox.classList.add("hidden");

    logList.innerHTML = "";
  }
});

/* ================= LOG 기록 ================= */
function loadLogs() {
  const logRef = ref(db, "loginLogs/" + user.uid);

  onValue(logRef, (snap) => {
    const data = snap.val();
    logList.innerHTML = "";

    if (!data) return;

    Object.values(data).forEach(d => {
      const div = document.createElement("div");
      div.className = "box";

      div.innerHTML = `
        <b>${d.type}</b><br>
        ${d.email}<br>
        ${d.time}
      `;

      logList.appendChild(div);
    });
  });
}
</script>

</body>
</html>
