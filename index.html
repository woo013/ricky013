<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>전기 안전 + Firebase 로그인 기록 시스템</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#e3f2fd,#fce4ec);
}

.container{
  width:min(900px,92%);
  margin:40px auto;
  background:#fff;
  padding:24px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{text-align:center;}

input, textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:4px;
}

.login{background:#42a5f5;color:#fff;}
.save{background:#66bb6a;color:#fff;}
.ai{background:#ffca28;}
.tts{background:#7e57c2;color:#fff;}
.logout{background:#ef5350;color:#fff;}

.box{
  margin-top:15px;
  padding:12px;
  background:#f7f9fb;
  border-radius:12px;
}
</style>
</head>

<body>
<div class="container">

<h1>⚡ 전기 안전 + 로그인 기록 시스템</h1>

<!-- AUTH -->
<div id="authBox">
  <input id="email" placeholder="이메일">
  <input id="pw" type="password" placeholder="비밀번호">
  <button class="login" onclick="signup()">회원가입</button>
  <button class="login" onclick="login()">로그인</button>
</div>

<!-- MAIN -->
<div id="mainBox" style="display:none">

  <button class="logout" onclick="logout()">로그아웃</button>

  <h3>⚡ 전기 안전 진단</h3>
  <textarea id="input" placeholder="예: 콘센트가 뜨겁고 탄 냄새가 난다"></textarea>

  <button class="ai" onclick="analyze()">AI 진단</button>
  <button class="tts" onclick="speak()">음성 출력</button>

  <div class="box">
    <b>진단 결과</b>
    <p id="result">-</p>
  </div>

  <div class="box">
    <b>로그인 기록</b>
    <div id="logList"></div>
  </div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* 🔥 Firebase 설정 */
const firebaseConfig = {
  apiKey: "AIzaSyBmI4WtKPBD4meKik1kte92FsrWWKE4zpY",
  authDomain: "test-cccd1.firebaseapp.com",
  databaseURL: "https://test-cccd1-default-rtdb.firebaseio.com",
  projectId: "test-cccd1",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;

/* =========================
   AUTH
========================= */

window.signup = async () => {
  await createUserWithEmailAndPassword(auth, email.value, pw.value);
};

window.login = async () => {
  const res = await signInWithEmailAndPassword(auth, email.value, pw.value);
  user = res.user;

  // 🔥 로그인 기록 저장
  const logRef = ref(db, "loginLogs/" + user.uid);
  const newLog = push(logRef);

  await set(newLog, {
    email: user.email,
    time: new Date().toLocaleString(),
    type: "login"
  });
};

window.logout = async () => {
  if(user){
    const logRef = ref(db, "loginLogs/" + user.uid);
    const newLog = push(logRef);

    await set(newLog, {
      email: user.email,
      time: new Date().toLocaleString(),
      type: "logout"
    });
  }

  await signOut(auth);
};

/* =========================
   AUTH STATE
========================= */

onAuthStateChanged(auth,(u)=>{
  if(u){
    user = u;
    authBox.style.display="none";
    mainBox.style.display="block";
    loadLogs();
  }else{
    authBox.style.display="block";
    mainBox.style.display="none";
  }
});

/* =========================
   AI (로컬 판단)
========================= */

window.analyze = () => {
  const t = input.value;

  let result = "";

  if(t.includes("탄") || t.includes("스파크") || t.includes("연기")){
    result = "🔴 위험: 즉시 전원 차단 필요";
  }
  else if(t.includes("뜨거") || t.includes("과열")){
    result = "🟡 주의: 과열 가능성 있음";
  }
  else{
    result = "🟢 정상 상태";
  }

  document.getElementById("result").innerText = result;
};

/* =========================
   TTS (브라우저)
========================= */

window.speak = () => {
  const text = document.getElementById("result").innerText;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ko-KR";
  speechSynthesis.speak(utter);
};

/* =========================
   로그인 기록 불러오기
========================= */

function loadLogs(){
  const logRef = ref(db, "loginLogs/" + user.uid);

  onValue(logRef,(snap)=>{
    const data = snap.val();
    logList.innerHTML = "";

    for(let id in data){
      const d = data[id];
      const div = document.createElement("div");
      div.className="box";
      div.innerHTML = `
        <b>${d.type}</b><br>
        ${d.email}<br>
        ${d.time}
      `;
      logList.appendChild(div);
    }
  });
}
</script>

</body>
</html>
