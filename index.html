<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Firebase 로그인 시스템</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#e3f2fd,#fce4ec);
}

.container{
  width:min(900px,92%);
  margin:40px auto;
  background:#fff;
  padding:24px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:4px;
}

.login{background:#42a5f5;color:#fff;}
.logout{background:#ef5350;color:#fff;}

.box{
  margin-top:15px;
  padding:12px;
  background:#f7f9fb;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<h1>⚡ Firebase 로그인 시스템</h1>

<!-- LOGIN -->
<div id="authBox">
  <input id="email" placeholder="이메일">
  <input id="pw" type="password" placeholder="비밀번호">
  <button class="login" onclick="login()">로그인</button>
</div>

<!-- MAIN -->
<div id="mainBox" style="display:none">
  <button class="logout" onclick="logout()">로그아웃</button>

  <div class="box">
    <b>로그인 기록</b>
    <div id="logList"></div>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  push,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmI4WtKPBD4meKik1kte92FsrWWKE4zpY",
  authDomain: "test-cccd1.firebaseapp.com",
  databaseURL: "https://test-cccd1-default-rtdb.firebaseio.com",
  projectId: "test-cccd1",

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user = null;

/* ===== DOM 직접 접근 (중요) ===== */
const emailInput = document.getElementById("email");
const pwInput = document.getElementById("pw");
const authBox = document.getElementById("authBox");
const mainBox = document.getElementById("mainBox");
const logList = document.getElementById("logList");

/* ================= LOGIN ================= */

window.login = async () => {
  try {
    const res = await signInWithEmailAndPassword(
      auth,
      emailInput.value,
      pwInput.value
    );

    user = res.user;

    // 로그인 기록 저장
    const logRef = ref(db, "loginLogs/" + user.uid);
    const newLog = push(logRef);

    await set(newLog, {
      email: user.email,
      time: new Date().toLocaleString(),
      type: "login"
    });

  } catch (err) {
    alert("로그인 실패: 이메일/비밀번호 확인");
    console.error(err);
  }
};

/* ================= LOGOUT ================= */

window.logout = async () => {
  if(user){
    const logRef = ref(db, "loginLogs/" + user.uid);
    const newLog = push(logRef);

    await set(newLog, {
      email: user.email,
      time: new Date().toLocaleString(),
      type: "logout"
    });
  }

  await signOut(auth);
};

/* ================= STATE ================= */

onAuthStateChanged(auth,(u)=>{
  if(u){
    user = u;
    authBox.style.display="none";
    mainBox.style.display="block";
    loadLogs();
  }else{
    authBox.style.display="block";
    mainBox.style.display="none";
  }
});

/* ================= LOAD LOGS ================= */

function loadLogs(){
  const logRef = ref(db, "loginLogs/" + user.uid);

  onValue(logRef,(snap)=>{
    const data = snap.val();
    logList.innerHTML = "";

    for(let id in data){
      const d = data[id];

      const div = document.createElement("div");
      div.className = "box";
      div.innerHTML = `
        <b>${d.type}</b><br>
        ${d.email}<br>
        ${d.time}
      `;
      logList.appendChild(div);
    }
  });
}
</script>

</body>
</html>
